<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skiing Simulator</title>

<div class="nav">
    <a href="index.html">← Back to About Me</a>
</div>

<div class="nav">
    <a href="running.html">← Learn About Running</a>
</div>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(#87ceeb, #ffffff);
    text-align: center;
}

#game {
    position: relative;
    width: 400px;
    height: 600px;
    margin: 20px auto;
    background: #f8fbff;
    border: 3px solid #333;
    overflow: hidden;
}

#player {
    position: absolute;
    font-size: 30px;
    bottom: 20px;
    left: 180px;
}

.tree {
    position: absolute;
    font-size: 30px;
    top: -40px;
}

.snow {
    position: absolute;
    color: white;
    font-size: 10px;
    opacity: 0.8;
}

#score, #highScore {
    font-size: 18px;
}

#overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-size: 24px;
    display: none;
}

button {
    padding: 10px 20px;
    font-size: 16px;
    margin-top: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>🎿 Skiing Simulator</h1>
<p>Use ← → to dodge trees!</p>

<div id="score">Score: 0</div>
<div id="highScore">High Score: 0</div>

<div id="game">
    <div id="player">⛷️</div>
    <div id="overlay">
        <div id="gameOverText">Game Over</div>
        <button onclick="restartGame()">Restart</button>
    </div>
</div>

<button onclick="startGame()">Start Game</button>

<script>
let player = document.getElementById("player");
let game = document.getElementById("game");
let scoreDisplay = document.getElementById("score");
let highScoreDisplay = document.getElementById("highScore");
let overlay = document.getElementById("overlay");

let playerX = 180;
let keys = {};
let speed = 3;
let score = 0;
let gameRunning = false;
let highScore = localStorage.getItem("skiHighScore") || 0;

let treeSpawnTimeout; // ✅ added for dynamic spawning

highScoreDisplay.innerText = "High Score: " + highScore;

/* Controls */
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

/* Player movement */
function movePlayer() {
    if (keys["ArrowLeft"] && playerX > 0) playerX -= 5;
    if (keys["ArrowRight"] && playerX < 360) playerX += 5;
    player.style.left = playerX + "px";
}

/* Trees */
function createTree() {
    if (!gameRunning) return;

    let tree = document.createElement("div");
    tree.classList.add("tree");
    tree.innerText = "🌲";
    tree.style.left = Math.random() * 360 + "px";
    game.appendChild(tree);

    let fall = setInterval(() => {
        let top = tree.offsetTop;
        tree.style.top = top + speed + "px";

        if (top > 520 && Math.abs(tree.offsetLeft - playerX) < 30) {
            endGame();
        }

        if (top > 600) {
            tree.remove();
            clearInterval(fall);
        }
    }, 20);
}

/* Snow */
function createSnow() {
    let snow = document.createElement("div");
    snow.classList.add("snow");
    snow.innerText = "❄";
    snow.style.left = Math.random() * 400 + "px";
    game.appendChild(snow);

    let fall = setInterval(() => {
        snow.style.top = snow.offsetTop + 2 + "px";
        if (snow.offsetTop > 600) {
            snow.remove();
            clearInterval(fall);
        }
    }, 30);
}

/* 🔥 NEW: adaptive tree spawning */
function scheduleTreeSpawn() {
    if (!gameRunning) return;

    // harder as score increases (minimum 200ms delay)
    let interval = Math.max(200, 1000 - score * 2);

    treeSpawnTimeout = setTimeout(() => {
        createTree();
        scheduleTreeSpawn();
    }, interval);
}

/* Game loop */
function gameLoop() {
    if (!gameRunning) return;

    movePlayer();
    score++;
    scoreDisplay.innerText = "Score: " + score;

    if (score % 200 === 0) speed++;

    requestAnimationFrame(gameLoop);
}

/* Start */
function startGame() {
    if (gameRunning) return;

    gameRunning = true;
    overlay.style.display = "none";

    score = 0;
    speed = 3;

    scheduleTreeSpawn(); // ✅ replaced fixed interval
    gameLoop();
}

/* End */
function endGame() {
    gameRunning = false;
    overlay.style.display = "flex";

    clearTimeout(treeSpawnTimeout); // ✅ stop spawning trees

    if (score > highScore) {
        highScore = score;
        localStorage.setItem("skiHighScore", highScore);
        highScoreDisplay.innerText = "High Score: " + highScore;
    }
}

/* Restart */
function restartGame() {
    location.reload();
}
</script>

</body>
</html>
